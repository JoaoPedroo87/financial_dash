<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Dashboard Financeiro</title>
</head>
<body>
<section>
    <div class="form">
        <h1>Adicionar Gasto</h1>

        <form action="/add" method="post">
            <input type="text" name="name" placeholder="Nome" required>
            <input type="number" step="0.01"name="value" placeholder="Valor" required>
            <input type="text" name="category" placeholder="Categoria" required>
            <button type="submit">Adicionar</button>
        </form>
    </div>  
</section>
<section>
    <div class="data">
        <h2>Gastos:</h2>
        
        <ul>
            {% for expense in expenses %}
                <li>
                    {{expense[1]}} - R$ {{ expense[2]}} - {{ expense[3]}}
                    <form action="/delete/{{ expense[0] }}" method="post" style="display: inline;">
                    <button type="submit">❌</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    </div>
</section>
</body>
</html>
